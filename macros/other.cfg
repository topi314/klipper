# [gcode_macro G32]
# description: Homes all axes and performs z tilt if not already completed
# gcode:
# 	HOME_ALL

[gcode_macro _CG28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

