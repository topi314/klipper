[gcode_macro _HOME_X]
gcode:
	SET_KINEMATIC_POSITION X=15 SET_HOMED=X
	G91
	G1 X-15 F1200

	M400

	G28 X

	G91
	G1 X-15 F1200

[gcode_macro _HOME_Y]
gcode:
	SET_KINEMATIC_POSITION Y=15 SET_HOMED=Y
	G91
	G1 Y-15 F1200
	
	M400

	G28 Y

	G91
	G1 Y-15 F1200

[gcode_macro _HOME_Z]
gcode:
	PROBE_CENTER

	G28 Z

	G1 Z10 F1500

[homing_override]
axes: xyz
gcode:
	{% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
	{% set is_paused = printer.print_stats.state == "paused" %}

	BED_MESH_CLEAR

	SAVE_GCODE_STATE NAME=HOMING

	{% if not is_paused %}
		SET_KINEMATIC_POSITION Z=1
		G1 Z15 F1200
	{% endif %}

	{% if home_all or 'X' in params %}
		_HOME_X
	{% endif %}
	
	{% if home_all or 'Y' in params %}
		_HOME_Y
	{% endif %}
	
	{% if home_all or 'Z' in params %}
		_HOME_Z
	{% endif %}

	RESTORE_GCODE_STATE NAME=HOMING
