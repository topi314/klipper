[gcode_macro PRINT_START]
gcode:
	PRIME_FLAGS_SET
	SAVE_GCODE_STATE NAME=PRINT_START
	{% set N = printer["gcode_macro GLOBAL_STATE"].max_tool|int %}
	{% set bed_temp = params.BED_TEMP|default(0) | float %}
	{% set initial_tool = params.INITIAL_TOOL | default(0) | int %}
	{% set initial_tool_temp = params.INITIAL_TEMP | default(0) | float %}
	{% set material = params.MATERIAL | default("") %}
	{% set ns = namespace(temps=[]) %}

	{% for i in range(N) %}
		{% if i == 0 %}
			{% set key = "EXTRUDER_TEMP" %}
		{% else %}
			{% set key = "EXTRUDER" ~ i ~ "_TEMP" %}
		{% endif %}
		{% set t = params[key]|default(0)|float %}
		{% set ns.temps = ns.temps + [t] %}
	{% endfor %}

	{% if initial_tool < N and ns.temps[initial_tool] > 0 %}
		{% set initial_tool_temp = ns.temps[initial_tool] %}
	{% endif %}

	{% if initial_tool_temp < printer.configfile.settings.extruder.min_extrude_temp %}
		{ action_raise_error("extruder temp too low") }
	{% endif %}

	SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}
	G28 home_all

	M400
	TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp * 0.9}
	{% for i in range(N) %}
		{% if ns.temps[i] > 0 %}
			{% if i == 0 %}
				SET_HEATER_TEMPERATURE HEATER=extruder TARGET={ns.temps[i] * 0.75}
			{% else %}
				SET_HEATER_TEMPERATURE HEATER={"extruder" ~ i} TARGET={ns.temps[i] * 0.75}
			{% endif %}
		{% endif %}
	{% endfor %}
	TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp}

	T0
	PROBE_CENTER
	PROBE_EDDY_NG_TAP
	DROP_CLOSE

	Z_TILT_ADJUST
    BED_MESH_CALIBRATE

	M400
	{% for i in range(N) %}
		{% if ns.temps[i] > 0 %}
			{% if i == 0 %}
				TEMPERATURE_WAIT SENSOR=extruder MINIMUM={ns.temps[i]} MAXIMUM={ns.temps[i] + 1}
			{% else %}
				TEMPERATURE_WAIT SENSOR={"extruder" ~ i} MINIMUM={ns.temps[i]} MAXIMUM={ns.temps[i] + 1}
			{% endif %}
		{% endif %}
	{% endfor %}
	{% if initial_tool == 0 %}
		TEMPERATURE_WAIT SENSOR=extruder MINIMUM={initial_tool_temp} MAXIMUM={initial_tool_temp + 1}
	{% else %}
		TEMPERATURE_WAIT SENSOR={"extruder" ~ initial_tool} MINIMUM={initial_tool_temp} MAXIMUM={initial_tool_temp + 1}
	{% endif %}

	PRIME_FLAGS_CLEAR T{current_extruder}

	LINE_PURGE

	RESTORE_GCODE_STATE NAME=PRINT_START

[gcode_macro PRINT_END]
gcode:
	TURN_OFF_HEATERS

	{% if not printer.pause_resume.is_paused %}
		PARK
	{% endif %}

	M400
	M107
	E_OFF
	PROBE_EDDY_NG_SET_TAP_OFFSET VALUE=0
	BED_MESH_CLEAR
	RESTORE_GCODE_STATE NAME=PRINT_START

[gcode_macro PAUSE]
description: Pause the running print and park toolhead
rename_existing: _PAUSE
gcode:
	M400
	_PAUSE
	PARK

[gcode_macro RESUME]
description: Resume the running print
rename_existing: _RESUME
gcode:
	SAVE_GCODE_STATE NAME=RESUME

	{% if printer.extruder.can_extrude %}
		M83 ; relative extrusion
		G1 E{printer['gcode_macro _KAMP_Settings'].tip_distance} F2100 ; unretract filament
	{% endif %}

	RESTORE_GCODE_STATE NAME=RESUME
	_RESUME {rawparams}

[gcode_macro CANCEL_PRINT]
description: Cancel the running print and park toolhead
rename_existing: _CANCEL_PRINT
gcode:
	PRINT_END
	_CANCEL_PRINT