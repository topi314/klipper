[mcu ebb]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_EBB36_GEN-if00
restart_method: command

[multi_pin part_fans]
pins: ebb:PD3, ebb:PA5

[fan]
pin: multi_pin:part_fans

[temperature_sensor ebb_36_mcu]
sensor_type: Generic 3950
sensor_pin: ebb:PA0
pullup_resistor: 2200

[servo opener]
pin: ebb:PB5
initial_angle: 0
