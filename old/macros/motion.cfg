[gcode_macro HOME_ALL]
description: Home all axes
gcode:
	SAVE_GCODE_STATE NAME=STATE_HOME_ALL

	ENSURE_HOMED_XYZ

	RESTORE_GCODE_STATE NAME=STATE_HOME_ALL

[gcode_macro ENSURE_HOMED_XY]
description: Home XY axes unless already homed
gcode:
	{% if "xy" not in printer.toolhead.homed_axes %}
		G28 X Y
	{% endif %}

[gcode_macro ENSURE_HOMED_XYZ]
description: Home XYZ axes unless already homed
gcode:
	ENSURE_HOMED_XY
	{% if "z" not in printer.toolhead.homed_axes %}
		G28 Z
	{% endif %}

[gcode_macro E_OFF]
description: Disable extruder motor
gcode:
	SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0

[gcode_macro XY_OFF]
description: Disable XY motors and clear XY homing
gcode:
	SET_STEPPER_ENABLE STEPPER=stepper_x ENABLE=0
	SET_STEPPER_ENABLE STEPPER=stepper_y ENABLE=0
	SET_KINEMATIC_POSITION CLEAR_HOMED=XY

[gcode_macro PARK]
description: Move toolhead to home position
gcode:
	SAVE_GCODE_STATE NAME=PARK
	{% set z_pos = [printer.toolhead.position.z, 20] | max %}

	G90 ; absolute positioning
	G0 X{printer.toolhead.axis_maximum.x - 2} Y{printer.toolhead.axis_maximum.y - 2} Z{z_pos} F18000 ; park nozzle at rear right
	RESTORE_GCODE_STATE NAME=PARK

[gcode_macro CENTER]
description: Move toolhead to center of bed
gcode:
	SAVE_GCODE_STATE NAME=CENTER
	G90 ; absolute positioning
	G0 X110 Y110 F18000 ; park nozzle at rear right
	RESTORE_GCODE_STATE NAME=CENTER

[gcode_macro FRONT]
description: Move toolhead to front
gcode:
	SAVE_GCODE_STATE NAME=FRONT
	G90 ; absolute positioning
	G0 X{printer.toolhead.axis_maximum.x / 2} Y0 F18000
	RESTORE_GCODE_STATE NAME=FRONT
