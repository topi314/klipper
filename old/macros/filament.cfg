[gcode_macro PURGE_FILAMENT]
description: Purges the specified length of filament
gcode:
	SAVE_GCODE_STATE NAME=PURGE_FILAMENT
	LOAD_UNLOAD_BEGIN {rawparams}

	{% set purge_length = params.LENGTH | default(50) | float %}

	M83 ; relative extrusion
	G1 E10 F{10 * 60} ; unretract
	G1 E{purge_length} F{5 * 60} ; purge filament
	G1 E-2 F{35 * 60} ; retract
	G1 E-8 F{10 * 60}

	M400
	RESTORE_GCODE_STATE NAME=PURGE_FILAMENT
	E_OFF

[gcode_macro LOAD_FILAMENT]
description: Loads new filament into toolhead
gcode:
	SAVE_GCODE_STATE NAME=LOAD_FILAMENT
	LOAD_UNLOAD_BEGIN {rawparams}

	M83 ; relative extrusion
	G1 E5 F60 ; extrude very slowly to allow the operator to feed the filament into the extruder gears
	G1 E50 F{10 * 60} ; move tip forward
	G1 E25 F{5 * 60} ; move tip rest of way, extrude a bit extra
	G1 E-2 F{35 * 60} ; retract
	G1 E-8 F{10 * 60}

	M400
	RESTORE_GCODE_STATE NAME=LOAD_FILAMENT
	E_OFF

[gcode_macro UNLOAD_FILAMENT]
description: Unloads filament from toolhead
gcode:
	SAVE_GCODE_STATE NAME=UNLOAD_FILAMENT
	LOAD_UNLOAD_BEGIN {rawparams}

	M83 ; relative extrusion
	G1 E-25 F{10 * 60} ; slowly remove tip from nozzle
	G1 E-50 F{35 * 60} ; spit out filament
	G1 E-50
	G1 E-50

	M400
	RESTORE_GCODE_STATE NAME=UNLOAD_FILAMENT
	E_OFF

[gcode_macro LOAD_UNLOAD_BEGIN]
gcode:
	{% set extruder_temp = params.TEMP | default(printer.extruder.target) | float %}

	{% if extruder_temp == 0 %}
		{% set extruder_temp = 230 %}
	{% endif %}

	{% if extruder_temp < printer.configfile.settings.extruder.min_extrude_temp %}
		{ action_raise_error("extruder temp too low") }
	{% endif %}

	SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}
	TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp - 2} MAXIMUM={extruder_temp + 2}
