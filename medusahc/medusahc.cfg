#####################################################################
# MedusaHC extension bundle
# Deploy scripts/medusahc.py → ~/klipper/klippy/extras/medusahc.py
#
# printer.cfg:
#   [include medusahc/medusahc.cfg]
#####################################################################

[include macros.cfg]
[include calibrate.cfg]

[medusahc]
init_delay: 2.0
assign_delay: 0.0
verbose: 0

# Head + dock switches
pin_e: ^!ebb:PA15

# Mainsail / Fluidd tool buttons and dock lamps
sync_mainsail_tools: 1
sync_mainsail_sensors: 1
color_pressed: 00C853
color_released: D32F2F
color_active: 1976D2
tool_button_color: 00FF00

# Feeder latch servo (must match [servo name] in printer.cfg)
servo: opener

# Shared dock motion
y_safe: -30
y_latch: -79.5
x_shift: 9
fast_accel: 5000
fast_speed: 100
y_prime: -50
y_brush: -70
x_prime_shift: 12
x_clean_move: 20

# Feeder latch extruder distances (mm filament)
e_open: -7
e_close: 6
e_cur_high_mult: 1.6

[medusahc_tool 0]
dock_pin: ^!PG10
x_base: -9
prime_amount: 10
prime_speed: 30
prime_retract: 0.5
prime_retract_speed: 30
clean_move: 1
clean_move_x: 10
clean_move_y: -2
clean_move_speed: 15
clean_retract: 1.5
clean_retract_speed: 30
first_prime_flag: 1
first_prime_amount: 15
first_prime_speed: 15

