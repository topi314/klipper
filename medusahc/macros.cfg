#####################################################################
# MedusaHC motion macros — edit freely (leading _ hides from macro UI)
# Called only from medusahc.py; Jinja reads printer.medusahc
#
#   _OPEN_START, _OPEN_MOVE     <- OPEN
#   _CLOSE_MOVE                 <- CLOSE
#   _SET_MOVE, _POST_PICKUP     <- T0…Tn
#   _DROP_MOVE                  <- DROP
#   _CLEAN_MOVE                 <- CLEAN
#   _MEDUSAHC_ERROR_PAUSE       <- ERROR (dock pause, no PARK)
#####################################################################

[gcode_macro _MEDUSAHC_ERROR_PAUSE]
description: Pause print at dock after tool-change failure (no PARK)
gcode:
    {% set y_safe = printer.medusahc.y_safe|float %}
    {% set z_pos = [printer.toolhead.position.z, 20]|max %}
    G90
    G0 Z{z_pos} F18000
    G1 Y{y_safe} F6000
    M400
    _PAUSE

[gcode_macro _OPEN_START]
gcode:
    {% set m = printer.medusahc %}
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_TMC_CURRENT STEPPER=extruder CURRENT={m.e_cur_high|float}
    SET_STEPPER_ENABLE STEPPER=extruder ENABLE=1

[gcode_macro _OPEN_MOVE]
gcode:
    {% set m = printer.medusahc %}
    {% if m.feeder_open|int == 0 %}
        {% set old_accel = printer.toolhead.max_accel %}
        {% set feedrate = m.fast_speed|float * 60 %}
        {% set e_open = m.e_open|float %}
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_STEPPER_ENABLE STEPPER=extruder ENABLE=1
        SET_VELOCITY_LIMIT ACCEL={m.fast_accel|float}
        SET_SERVO SERVO={m.servo} ANGLE=180
        G91
        G4 P200
        G1 E-0.2 F2500
        G1 E0.2 F2500
        G1 E-0.2 F2500
        G1 E0.2 F2500
        G1 E{e_open} F2500
        G90
        SET_VELOCITY_LIMIT ACCEL={old_accel}
        SET_TMC_CURRENT STEPPER=extruder CURRENT={m.e_cur|float}
    {% endif %}

[gcode_macro _CLOSE_MOVE]
gcode:
    {% set m = printer.medusahc %}
    {% set e_close = m.e_close|float %}
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_TMC_CURRENT STEPPER=extruder CURRENT={m.e_cur_high|float}
    SET_STEPPER_ENABLE STEPPER=extruder ENABLE=1
    SET_SERVO SERVO={m.servo} ANGLE=0
    G91
    G1 E{e_close} F6000
    G90
    G4 P400
    SET_TMC_CURRENT STEPPER=extruder CURRENT={m.e_cur|float}

[gcode_macro _SET_MOVE]
gcode:
    {% if 'T' not in params %}
        {action_respond_info("_SET_MOVE: missing T")}
    {% else %}
        {% set T = params.T|int %}
        {% set m = printer.medusahc %}
        {% set max_tool = m.tool_count|int %}
        {% if T < 0 or T >= max_tool %}
            {action_respond_info("_SET_MOVE: bad T")}
        {% else %}
            {% set x_base = m["tool%d_x_base" % T]|float %}
            {% set y_safe = m.y_safe|float %}
            {% set y_latch = m.y_latch|float %}
            {% set y_prime = m.y_prime|float %}
            {% set x_shift = m.x_shift|float %}
            {% set x_prime_shift = m.x_prime_shift|float %}
            {% set old_accel = printer.toolhead.max_accel %}
            {% set feedrate = m.fast_speed|float * 60 %}
            {% set slow_feedrate = m.fast_speed|float * 5 %}

            {% if m.feeder_open|int == 0 %}
                OPEN
            {% endif %}
            TOOL_OFFSET_T T=0
            SET_GCODE_OFFSET X=0 Y=0 MOVE=1
            SET_VELOCITY_LIMIT ACCEL={m.fast_accel|float}
            G90
            G1 Y{y_safe} X{x_base} F{feedrate}
            G1 Y{y_latch + 3} F{feedrate}
            G1 Y{y_latch} F{slow_feedrate}
            G1 Y{y_latch - 0.3} F{slow_feedrate}
            G1 X{x_base - x_shift + 2} F{feedrate}
            G1 X{x_base - x_shift} F{slow_feedrate}
            G1 Y{y_prime} F{feedrate}
            G1 X{x_base - x_prime_shift} F{feedrate}
            SET_VELOCITY_LIMIT ACCEL={old_accel}
        {% endif %}
    {% endif %}

[gcode_macro _POST_PICKUP]
description: Close feeder, prime, brush, apply offsets after successful pickup
gcode:
    {% if 'T' not in params %}
        {action_respond_info("_POST_PICKUP: missing T")}
    {% else %}
        {% set T = params.T|int %}
        {% set m = printer.medusahc %}
        {% set max_tool = m.tool_count|int %}
        {% if T < 0 or T >= max_tool %}
            {action_respond_info("_POST_PICKUP: bad T")}
        {% else %}
            {% set y_safe = m.y_safe|float %}
            {% set y_brush = m.y_brush|float %}
            {% set y_prime = m.y_prime|float %}
            {% set x_base = m["tool%d_x_base" % T]|float %}
            {% set x_prime_shift = m.x_prime_shift|float %}
            {% set old_accel = printer.toolhead.max_accel %}
            {% set feedrate = m.fast_speed|float * 60 %}
            {% set extr = 'extruder' if T == 0 else 'extruder' ~ T %}
            {% set temp = printer[extr].temperature|float %}

            CLOSE
            G4 P200

            {% if printer.print_stats.state|string == "printing" and temp > 170.0 %}
                {% set fp_flag = m["tool%d_first_prime_flag" % T]|int %}
                {% set fp_amt = m["tool%d_first_prime_amount" % T]|float %}
                {% set fp_spd = m["tool%d_first_prime_speed" % T]|float %}
                {% set fp_f = (fp_spd * 60.0)|int %}

                {% if fp_flag == 0 %}
                    RESPOND MSG="FIRST PRIME: executed"
                    G91
                    G1 E{fp_amt} F{fp_f}
                    G90
                    G1 Y{y_safe} F{feedrate}
                    G1 Y{y_prime} F{feedrate}
                    _SET_FIRST_PRIME_FLAG T={T} VALUE=1
                {% else %}
                    RESPOND MSG="FIRST PRIME: skipped"
                {% endif %}

                {% set amt = m["tool%d_prime_amount" % T]|float %}
                {% set spd = m["tool%d_prime_speed" % T]|float %}
                {% set r_amt = m["tool%d_prime_retract" % T]|float %}
                {% set r_spd = m["tool%d_prime_retract_speed" % T]|float %}
                {% set e1 = amt * 0.20 %}
                {% set e2 = amt * 0.30 %}
                {% set e3 = amt * 0.50 %}
                {% set f1 = (spd * 0.50 * 60.0)|int %}
                {% set f2 = (spd * 0.75 * 60.0)|int %}
                {% set f3 = (spd * 1.00 * 60.0)|int %}
                {% set fr = (r_spd * 60.0)|int %}

                G91
                G1 E{e1} F{f1}
                G1 E{e2} F{f2}
                G1 E{e3} F{f3}
                G1 E-{r_amt} F{fr}
                G90
                RESPOND MSG="PRIME: T executed"
            {% endif %}

            {% if printer.print_stats.state|string == "printing" %}
                {% set cmx = m["tool%d_clean_move_x" % T]|float %}
                {% set cmy = m["tool%d_clean_move_y" % T]|float %}
                {% set cms = m["tool%d_clean_move_speed" % T]|float|int %}
                {% set cmf = (cms * 60.0)|int %}
                {% set r_amt = m["tool%d_clean_retract" % T]|float %}
                {% set r_spd = m["tool%d_clean_retract_speed" % T]|float %}
                {% set rf = (r_spd * 60.0)|int %}

                G1 Y{y_brush} F{feedrate}
                G91
                G1 X{cmx} Y{cmy} F{cmf}
                G90
                G1 Y{y_safe} F{feedrate}
                TOOL_OFFSET_T T={T}
                G91
                G1 E-{r_amt} F{rf}
                G90
                G1 F{feedrate}
            {% else %}
                G1 Y{y_safe} F{feedrate}
                TOOL_OFFSET_T T={T}
                G90
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro _DROP_MOVE]
gcode:
    {% if 'T' not in params %}
        {action_respond_info("_DROP_MOVE: missing T")}
    {% else %}
        {% set T = params.T|int %}
        {% set m = printer.medusahc %}
        {% set max_tool = m.tool_count|int %}
        {% if T < 0 or T >= max_tool %}
            {action_respond_info("_DROP_MOVE: bad T")}
        {% else %}
            {% set x_base = m["tool%d_x_base" % T]|float %}
            {% set y_safe = m.y_safe|float %}
            {% set y_latch = m.y_latch|float %}
            {% set y_prime = m.y_prime|float %}
            {% set x_shift = m.x_shift|float %}
            {% set x_prime_shift = m.x_prime_shift|float %}
            {% set old_accel = printer.toolhead.max_accel %}
            {% set feedrate = m.fast_speed|float * 60 %}

            TOOL_OFFSET_T T=0
            SET_GCODE_OFFSET X=0 Y=0 MOVE=1
            SET_VELOCITY_LIMIT ACCEL={m.fast_accel|float}
            G90
            G1 Y{y_safe} X{x_base - x_prime_shift} F{feedrate}
            G1 Y{y_prime} F{feedrate}
            {% if m.feeder_open|int == 0 %}
                OPEN
            {% endif %}
            G90
            G1 X{x_base - x_shift} F{feedrate}
            G1 Y{y_latch} F{feedrate}
            G1 X{x_base} F{feedrate}
            G1 Y{y_safe} F{feedrate}
            SET_VELOCITY_LIMIT ACCEL={old_accel}
        {% endif %}
    {% endif %}

[gcode_macro _CLEAN_MOVE]
gcode:
    {% if 'T' not in params %}
        {action_respond_info("_CLEAN_MOVE: missing T")}
    {% else %}
        {% set T = params.T|int %}
        {% set m = printer.medusahc %}
        {% set max_tool = m.tool_count|int %}
        {% if T < 0 or T >= max_tool %}
            {action_respond_info("_CLEAN_MOVE: bad T")}
        {% else %}
            {% set x_base = m["tool%d_x_base" % T]|float %}
            {% set y_safe = m.y_safe|float %}
            {% set y_brush = m.y_brush|float %}
            {% set y_prime = m.y_prime|float %}
            {% set x_prime_shift = m.x_prime_shift|float %}
            {% set x_clean_move = m.x_clean_move|float %}
            {% set old_accel = printer.toolhead.max_accel %}
            {% set feedrate = m.fast_speed|float * 60 %}
            {% set feedrate_clean = m.fast_speed|float * 10 %}

            SET_VELOCITY_LIMIT ACCEL={m.fast_accel|float}
            G90
            G1 Y{y_safe} F{feedrate}
            G1 X{x_base} F{feedrate}
            G1 Y{y_prime} F{feedrate}
            G1 X{x_base - x_prime_shift} F{feedrate}
            G1 Y{y_brush} F{feedrate}
            G1 X{x_base - x_prime_shift + x_clean_move} F{feedrate_clean}
            G1 X{x_base - x_prime_shift} F{feedrate_clean}
            G1 X{x_base - x_prime_shift + x_clean_move} F{feedrate_clean}
            G1 X{x_base - x_prime_shift} F{feedrate_clean}
            G1 X{x_base - x_prime_shift + x_clean_move} F{feedrate_clean}
            G1 X{x_base - x_prime_shift} F{feedrate_clean}
            G1 X{x_base} F{feedrate}
            G1 Y{y_safe} F{feedrate}
            SET_VELOCITY_LIMIT ACCEL={old_accel}
        {% endif %}
    {% endif %}
