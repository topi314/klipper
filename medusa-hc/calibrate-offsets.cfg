
[tools_calibrate]
pin: ^PB7
travel_speed: 20  
spread: 4  # mms to travel sideways for XY probing
lower_z: 0.1  # mms to travel down from top for XY probing
speed: .5  # The speed (in mm/sec) to move tools down onto the probe
lift_speed: 4  # The speed (in mm/sec) to retract between probes
final_lift_z: 6 # Z Lift after probing done, should be greater than any Z variance between tools
sample_retract_dist: 1
samples_tolerance:  0.03
samples_tolerance_retries: 20
samples: 8
samples_result: median # median, average
# Settings for nozzle probe calibration - optional.

probe: probe # name of the nozzle probe to use
trigger_to_bottom_z: 0.25 # Offset from probe trigger to vertical motion bottoms out. 
# decrease if the nozzle is too high, increase if too low.


[gcode_macro CALIBRATE_MOVE_OVER_PROBE]
# Approximate coordinates of the point directly above the tool calibration probe.
# Adjust these to match your printer: the nozzle should end up centered over
# the probe pin with enough Z clearance to avoid crashing on tool change.
# variable_probe_x: 205     # X position above the probe (mm)
# variable_probe_y: 26      # Y position above the probe (mm)
# variable_probe_z: 65      # Safe Z height before traveling to the probe (mm)

variable_probe_x: -17     # X position above the probe (mm)
variable_probe_y: 26      # Y position above the probe (mm)
variable_probe_z: 16      # Safe Z height before traveling to the probe (mm)
gcode:
	BED_MESH_CLEAR
	G0 Z{probe_z} F2000
	G0 X{probe_x} Y{probe_y} F8000

[gcode_macro CALIBRATE_TOOL_OFFSETS]
gcode:
	{% set max_tool = printer["gcode_macro GLOBAL_STATE"].max_tool|int %}
	T0
	CALIBRATE_MOVE_OVER_PROBE
	TOOL_LOCATE_SENSOR
	{% for tool in range(1, max_tool) %}
		T{tool}
		TOOL_CALIBRATE_TOOL_OFFSET
	{% endfor %}

[gcode_macro CALIBRATE_NOZZLE_PROBE_OFFSET]
gcode:    
	CALIBRATE_MOVE_OVER_PROBE
	M109 S150    
	TOOL_LOCATE_SENSOR
	TOOL_CALIBRATE_PROBE_OFFSET
	M104 S0

[gcode_macro CALIBRATE_AND_SAVE_OFFSETS]
gcode:
	{% set max_tool = printer["gcode_macro GLOBAL_STATE"].max_tool|int %}

	{% for i in range(max_tool) %}
        M104 T{i} S150
    {% endfor %}
    M109 T0 S150

	T0
	CALIBRATE_MOVE_OVER_PROBE
	TOOL_LOCATE_SENSOR
	{% for tool in range(1, max_tool) %}
		TOOL_OFFSET_T T={T} MOVE=0
		SAVE_GCODE_STATE
		T{tool}
		RESTORE_GCODE_STATE MOVE=1
		TOOL_CALIBRATE_TOOL_OFFSET
		_APPLY_LAST_RESULT_TO_TOOL_OFFSET T={tool}
	{% endfor %}
	DROP_TOOL
	TURN_OFF_HEATERS
	PARK

[gcode_macro _APPLY_LAST_RESULT_TO_TOOL_OFFSET]
description: Apply printer.tools_calibrate.last_*_result to tool T - writes runtime
  TOOL_OFFSET.t<N>_off_* AND saves to save_variables in one step.
gcode:
	{% if 'T' not in params %}
		RESPOND MSG="_APPLY_LAST_RESULT_TO_TOOL_OFFSET: missing T"
		ERROR
	{% else %}
		{% set T = params.T|int %}
		{% set max_tool = printer["gcode_macro GLOBAL_STATE"].max_tool|int %}
		{% if T < 0 or T >= max_tool %}
			RESPOND MSG="_APPLY_LAST_RESULT_TO_TOOL_OFFSET: bad T"
			ERROR
		{% else %}
			{% set x = printer.tools_calibrate.last_x_result|float %}
			{% set y = printer.tools_calibrate.last_y_result|float %}
			{% set z = printer.tools_calibrate.last_z_result|float %}

			{% set kx = "t" ~ T ~ "_off_x" %}
			{% set ky = "t" ~ T ~ "_off_y" %}
			{% set kz = "t" ~ T ~ "_off_z" %}

			SET_GCODE_VARIABLE MACRO=TOOL_OFFSET VARIABLE={kx} VALUE={x}
			SET_GCODE_VARIABLE MACRO=TOOL_OFFSET VARIABLE={ky} VALUE={y}
			SET_GCODE_VARIABLE MACRO=TOOL_OFFSET VARIABLE={kz} VALUE={z}

			{% set sx = "t" ~ T ~ "_gcode_x_offset" %}
			{% set sy = "t" ~ T ~ "_gcode_y_offset" %}
			{% set sz = "t" ~ T ~ "_gcode_z_offset" %}

			SAVE_VARIABLE VARIABLE={sx} VALUE={x}
			SAVE_VARIABLE VARIABLE={sy} VALUE={y}
			SAVE_VARIABLE VARIABLE={sz} VALUE={z}

			{action_respond_info(
				"APPLY: T" ~ T ~
				" X=" ~ x ~
				" Y=" ~ y ~
				" Z=" ~ z ~
				" (TOOL_OFFSET + saved_vars)"
			)}
		{% endif %}
	{% endif %}


[gcode_macro SAVE_TOOL_GCODE_OFFSETS]
description: Save TOOL_OFFSET tN_off_* into save_variables
gcode:
	{% if 'T' not in params %}
		RESPOND MSG="SAVE_TOOL_GCODE_OFFSETS: missing T"
		ERROR
	{% else %}
		{% set T = params.T|int %}
		{% set max_tool = printer["gcode_macro GLOBAL_STATE"].max_tool|int %}
		{% if T < 0 or T >= max_tool %}
			RESPOND MSG="SAVE_TOOL_GCODE_OFFSETS: bad T"
			ERROR
		{% else %}
			{% set kx = "t" ~ T ~ "_off_x" %}
			{% set ky = "t" ~ T ~ "_off_y" %}
			{% set kz = "t" ~ T ~ "_off_z" %}

			{% set x = printer["gcode_macro TOOL_OFFSET"][kx]|float %}
			{% set y = printer["gcode_macro TOOL_OFFSET"][ky]|float %}
			{% set z = printer["gcode_macro TOOL_OFFSET"][kz]|float %}

			{% set sx = "t" ~ T ~ "_gcode_x_offset" %}
			{% set sy = "t" ~ T ~ "_gcode_y_offset" %}
			{% set sz = "t" ~ T ~ "_gcode_z_offset" %}

			SAVE_VARIABLE VARIABLE={sx} VALUE={x}
			SAVE_VARIABLE VARIABLE={sy} VALUE={y}
			SAVE_VARIABLE VARIABLE={sz} VALUE={z}

			{action_respond_info(
				"SAVE_TOOL_GCODE_OFFSETS: T" ~ T ~
				" X=" ~ x ~
				" Y=" ~ y ~
				" Z=" ~ z
			)}
		{% endif %}
	{% endif %}

[gcode_macro _DUMP_TC_STATE]
description: Print printer.tools_calibrate state. Called as a separate macro so
  Jinja re-evaluates fresh values after the previous Python command.
gcode:
	{% set label = params.LABEL|default("tc state") %}
	{% set rx = printer.tools_calibrate.last_x_result|float %}
	{% set ry = printer.tools_calibrate.last_y_result|float %}
	{% set rz = printer.tools_calibrate.last_z_result|float %}
	RESPOND MSG="--- {label} ---"
	RESPOND MSG="last_result: X={rx} Y={ry} Z={rz}"

[gcode_macro _DUMP_STORED_T1]
gcode:
	{% set cx = printer["gcode_macro TOOL_OFFSET"].t1_off_x|float %}
	{% set cy = printer["gcode_macro TOOL_OFFSET"].t1_off_y|float %}
	{% set cz = printer["gcode_macro TOOL_OFFSET"].t1_off_z|float %}
	RESPOND MSG="--- Currently stored TOOL_OFFSET T1 ---"
	RESPOND MSG="t1_off_x={cx} t1_off_y={cy} t1_off_z={cz}"