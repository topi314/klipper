[include fluidd.cfg]

[include macros/*.cfg]

[include timelapse.cfg]

[include kamp.cfg]

[include eddy_ng.cfg]

[include input_shaper.cfg]

[include toolhead.cfg]

[include tools.cfg]

[include medusa-hc/*.cfg]

[mcu]
serial: /dev/ttyAMA0
restart_method: command

[mcu expander]
serial: /dev/serial/by-id/usb-Klipper_rp2040_5054316550FB8B1C-if00
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: corexy
max_velocity: 700
max_accel: 18000
max_z_velocity: 50
max_z_accel: 500

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

[virtual_sdcard]
path: /home/topi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[z_tilt]
z_positions:
    232, 89
    -16, 89
    110, 255
points:
    200, 18
    20, 18
    110, 170
retries: 3
retry_tolerance: 0.02
horizontal_move_z: 2.0

[bed_mesh]
speed: 200
horizontal_move_z: 2
mesh_min: 5, 50
mesh_max: 215, 225
probe_count: 16, 16
algorithm: bicubic

[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 64
rotation_distance: 32
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 240
position_min: -22
position_max: 240
homing_speed: 50
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PC4
diag_pin: PG6
run_current: 0.750
stealthchop_threshold: 0
driver_SGTHRS: 130

[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 64
rotation_distance: 32
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 241
position_min: -31
position_max: 241
homing_speed: 50
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PD11
diag_pin: PG9
run_current: 0.750
stealthchop_threshold: 0
driver_SGTHRS: 130

[stepper_z]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
microsteps: 128
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -50
homing_speed: 25
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PC6
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA2
microsteps: 128
rotation_distance: 8

[tmc2209 stepper_z1]
uart_pin: PC7
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z2]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
microsteps: 128
rotation_distance: 8

[tmc2209 stepper_z2]
uart_pin: PF2
run_current: 0.580
stealthchop_threshold: 999999

[heater_bed]
heater_pin: PA1
sensor_type: ATC Semitec 104GT-2
sensor_pin: PF3
control: pid
pid_Kp: 71.174
pid_Ki: 1.293
pid_Kd: 979.537
min_temp: 0
max_temp: 130

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[fan_generic electronics]
pin: PD15

[exclude_object]

[respond]

[gcode_arcs]
resolution: 1.0

[pause_resume]
recover_velocity: 100

[force_move]
enable_force_move: true

