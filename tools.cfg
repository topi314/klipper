
[duplicate_pin_override]
pins: PG10, PG11, PG12, PG13, ebb:PA15, ebb:PB14, ebb:PA8, ebb:PB6

[tmc2209 extruder]
uart_pin: ebb:PB3
run_current: 0.750
interpolate: true

[extruder]
step_pin: ebb:PB14
dir_pin: !ebb:PA8
enable_pin: !ebb:PB6
microsteps: 32
rotation_distance: 4.6865
pressure_advance: 0.035
pressure_advance_smooth_time: 0.019
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA0
sensor_pin: PF4
sensor_type: ATC Semitec 104GT-2
control = pid
pid_kp = 22.2
pid_ki = 1.08
pid_kd = 114
min_temp: 0
max_temp: 290
max_extrude_cross_section: 9999999
max_extrude_only_distance: 700
min_extrude_temp: 0
smooth_time: 2.0

[heater_fan hotend_fan]
heater: extruder
pin: PA8

[verify_heater extruder]
check_gain_time: 20
hysteresis: 10
heating_gain: 1

